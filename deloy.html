        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;

        .logo {

            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;

            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;

        .logo-top {
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .logo-bottom {
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Hamburger Menu */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            width: 30px;
            height: 2px;
            background: #1a1a1a;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Mobile Menu*/ 
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: white;
            transition: right 0.4s ease;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .mobile-menu.active {
            right: 0;
        }

        .mobile-menu nav {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            text-align: center;
        }

        .mobile-menu nav a {
            font-size: 2rem;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 300;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .mobile-menu nav a:hover {
            opacity: 0.6;
        }

        .mobile-menu nav a.has-submenu::after {
            content: '›';
            font-size: 2.5rem;
            font-weight: 300;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .social-icons a {
            width: 50px;
            height: 50px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .social-icons a:hover {

    <script>
        
  // Hamburger Menu Toggle
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    mobileMenu.classList.toggle('active');
  });

  // MENU PAGES
  const mainMenu = document.getElementById('mainMenu');
  const workMenu = document.getElementById('workMenu');
  const openWork = document.getElementById('openWork');
  const backToMain = document.getElementById('backToMain');

  // Open Work menu page
  openWork.addEventListener('click', (e) => {
    e.preventDefault();
    mainMenu.classList.remove('active');
    workMenu.classList.add('active');
  });

  // Back to Main menu
  backToMain.addEventListener('click', (e) => {
    e.preventDefault();
    workMenu.classList.remove('active');
    mainMenu.classList.add('active');
  });

  // Close menu when clicking a REAL link (not Work / Back)
  const menuLinks = document.querySelectorAll(
    '.mobile-menu a:not(#openWork):not(#backToMain)'
  );

  menuLinks.forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('active');
      mobileMenu.classList.remove('active');

      // reset menu pages
      workMenu.classList.remove('active');
      mainMenu.classList.add('active');
    });
  });

  // Close menu when clicking outside
  mobileMenu.addEventListener('click', (e) => {
    if (e.target === mobileMenu) {
      hamburger.classList.remove('active');
      mobileMenu.classList.remove('active');

      // reset pages
      workMenu.classList.remove('active');
      mainMenu.classList.add('active');
    }
  });
</script>
